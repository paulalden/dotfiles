###############################################################################
# Display
###############################################################################

# Nord palette — lives in nord.conf (shared with the claude-*.sh scripts).
source-file ~/.config/tmux/config/nord.conf

set -g @mode_indicator_prefix_prompt " WAIT #[default]#[fg=$green]"
set -g @mode_indicator_prefix_mode_style bg=$green,fg=$fg
set -g @mode_indicator_copy_prompt " COPY #[default]#[fg=$blue]"
set -g @mode_indicator_copy_mode_style bg=$blue,fg=$fg
set -g @mode_indicator_sync_prompt " SYNC #[default]#[fg=$red]"
set -g @mode_indicator_sync_mode_style bg=$red,fg=$fg
set -g @mode_indicator_empty_prompt " TMUX #[default]#[fg=$grey12]"
set -g @mode_indicator_empty_mode_style bg=$grey12,fg=$grey7

set -g @route_to_ping "vultr.net"   # Use a UK based site to ping
set -g @online_icon "#[fg=$green]〇"
set -g @offline_icon "#[fg=$red]〇"

set -g status on
set -g status-justify centre
set -g status-position bottom
set -g status-left-length 90
set -g status-right-length 140
set -g status-style "bg=$bg"
set -g window-style "fg=$grey10,bg=$grey13_dark"
set -g window-active-style "fg=$fg,bg=$bg"

set -g message-style bg=$magenta,fg=$bg
set -g pane-border-style fg=$grey11
set -g pane-active-border-style fg=$magenta

# Popup styling
set -g popup-style "bg=$bg,fg=$fg"
set -g popup-border-style "fg=$magenta"
set -g popup-border-lines rounded
setw -g window-status-separator ""

#################################### FORMAT ####################################
set -g status-left "#{tmux_mode_indicator} "
set -g status-right "#(~/.config/tmux/scripts/claude-tick.sh)#[fg=$grey11]#{online_status}   #[fg=$grey11]%R"

setw -g window-status-format "#[fg=$grey11,nobold,nounderscore,noitalics] #[fg=$grey11] #I #{?#{==:#{@claude_alert},urgent},#[bold]#W#[nobold],#W}#{?#{==:#{@claude_alert},urgent}, #[fg=$red]●#[fg=$grey11],#{?#{==:#{@claude_alert},done}, #[fg=$blue]●#[fg=$grey11],#{?#{==:#{@claude_alert},working}, #[fg=$yellow]●#[fg=$grey11],}}} #[fg=$grey11,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=$grey11,nobold,nounderscore,noitalics] #[fg=$magenta] #I #{?#{==:#{@claude_alert},urgent},#[bold]#W#[nobold],#W}#{?#{==:#{@claude_alert},urgent}, #[fg=$red]●#[fg=$magenta],#{?#{==:#{@claude_alert},done}, #[fg=$blue]●#[fg=$magenta],#{?#{==:#{@claude_alert},working}, #[fg=$yellow]●#[fg=$magenta],}}} #[fg=$grey11,nobold,nounderscore,noitalics]"
