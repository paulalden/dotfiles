# Using Tmux Copy mode:
#
# Enter the copy-mode: prefix [
# Navigate: h, j, k, l, w, W, b, B, {, }
# Search: ?, /
# Start highlight: v
# Yank the highlighted text: Enter
# Paste: prefix ]

###############################################################################
# Key Bindings
###############################################################################

# Unset default prefix
unbind C-b
unbind C-a

# Set Prefix to Ctrl+a
set-option -g prefix C-space
bind-key C-space send-prefix

# Split panes using \ and - (\ because it doesn't require shift)
# Start in same directory when splitting windows
bind '\' split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

# When creating a window, start at the same path
bind c new-window -c '#{pane_current_path}'

# Switch Pane positions
bind -n M-[ swap-pane -D
bind -n M-] swap-pane -U

# Toggle the status bar (prefix + t t)

bind P paste-buffer
# bind-key -T copy-mode-vi v send-keys -X begin-selection
# bind-key -T copy-mode-vi y send-keys -X rectangle-toggle
unbind -T copy-mode-vi Enter

# set mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'


# Copy to clipboard
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'

# Resizing with mouse drag
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'

# # Reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display '~/.config/tmux/tmux.conf sourced'
bind-key M split-window -h "nvim ~/.config/tmux/tmux.conf"

# Tmux sessionizer
bind e run-shell "tmux neww ~/.config/tmux/scripts/tmux-sessionizer.sh"

###############################################################################
# Tmux Nagivator - https://github.com/christoomey/vim-tmux-navigator
###############################################################################

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

###############################################################################
# Popup keymaps
###############################################################################

%hidden POPUP="~/.config/tmux/scripts/fzf-popup.sh"

bind -r f display-popup -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP ranger"
bind -r d display-popup -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP lazysql"
bind-key h display-popup -w 90% -h 90% -E "$POPUP htop"
bind-key i display-popup -w 90% -h 90% -E "$POPUP irb"
bind-key v display-popup -w 90% -h 90% -E "$POPUP cloudflare-speed-cli"

###############################################################################
# FZF keymaps
###############################################################################

# Files & Navigation
bind-key E display-popup -T '#[align=centre] Edit File ' -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-edit-file.sh"
# Tmux (prefix + t, then second key)
bind-key t switch-client -T tmux-popup
bind-key -T tmux-popup p display-popup -T '#[align=centre] Switch Pane ' -E -w 50% -h 50% "$POPUP ~/.config/tmux/scripts/fzf-switch-pane.sh"
bind-key -T tmux-popup t set-option status
bind-key s display-popup -T '#[align=centre] Search ' -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-rg.sh"

# Git (prefix + g, then second key)
bind-key g switch-client -T git
bind-key -T git g display-popup -T '#[align=centre] Lazygit ' -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP lazygit -ucd ~/.config/lazygit/"
bind-key -T git b display-popup -T '#[align=centre] Git Branch ' -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-git-branch.sh"
bind-key -T git l display-popup -T '#[align=centre] Git Log ' -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-git-log.sh"
bind-key -T git s display-popup -T '#[align=centre] Git Stash ' -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-git-stash.sh"

# System & Tools
bind-key K display-popup -T '#[align=centre] Kill Process ' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-kill-process.sh"
bind-key N display-popup -T '#[align=centre] Ports ' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-ports.sh"