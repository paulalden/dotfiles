# Using Tmux Copy mode:
#
# Enter the copy-mode: prefix [
# Navigate: h, j, k, l, w, W, b, B, {, }
# Search: ?, /
# Start highlight: v
# Yank the highlighted text: Enter
# Paste: prefix ]

###############################################################################
# Key Bindings
###############################################################################

# Unset default prefix
unbind C-b
unbind C-a

# Set Prefix to Ctrl+a
set-option -g prefix C-space
bind C-space send-prefix

# Split panes using \ and - (\ because it doesn't require shift)
# Start in same directory when splitting windows
bind '\' split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

# When creating a window, start at the same path
bind c new-window -c '#{pane_current_path}'

# Switch Pane positions
bind -n M-[ swap-pane -D
bind -n M-] swap-pane -U

# Toggle the status bar (prefix + t t)

# prefix-P - Paste the top tmux buffer
bind P paste-buffer
# bind -T copy-mode-vi v send-keys -X begin-selection
# bind -T copy-mode-vi y send-keys -X rectangle-toggle
unbind -T copy-mode-vi Enter

# set mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'


# Copy to clipboard
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'

# Resizing with mouse drag
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'

# prefix-r - Reload the tmux config
bind r source-file ~/.config/tmux/tmux.conf \; display ' ~/.config/tmux/tmux.conf sourced '
# prefix-M - Edit tmux.conf in a split
bind M split-window -h "nvim ~/.config/tmux/tmux.conf"

###############################################################################
# Tmux Nagivator - https://github.com/christoomey/vim-tmux-navigator
###############################################################################

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R
bind -T copy-mode-vi 'C-\' select-pane -l

###############################################################################
# Popup keymaps
###############################################################################

%hidden POPUP="~/.config/tmux/scripts/fzf-popup.sh"

# prefix-f - Ranger file manager
bind -r f display-popup -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP ranger"
# prefix-d - LazySQL
bind -r d display-popup -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP lazysql"
# prefix-h - Htop
bind h display-popup -w 90% -h 90% -E "$POPUP htop"
# prefix-i - IRB (Ruby REPL)
bind i display-popup -w 90% -h 90% -E "$POPUP irb"
# prefix-v - Cloudflare speed test
bind v display-popup -w 90% -h 90% -E "$POPUP cloudflare-speed-cli"

###############################################################################
# FZF keymaps
###############################################################################

# Tmux (prefix + t, then second key)
bind t switch-client -T tmux-popup

# prefix-tp - Tmux Panes
bind -T tmux-popup p display-popup -T '#[align=centre] Switch Pane ' -E -w 50% -h 50% "$POPUP ~/.config/tmux/scripts/fzf-switch-pane.sh"

# prefix-tt - Toggle status bar
bind -T tmux-popup t set-option status

# prefix-te - Tmux Sessionizer
bind -T tmux-popup e display-popup -T '#[align=centre] Sessionizer ' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/tmux-sessionizer.sh"

# prefix-ts - Tmux Sessions (switch/kill)
bind -T tmux-popup s display-popup -T '#[align=centre] Sessions ' -E -w 50% -h 50% "$POPUP ~/.config/tmux/scripts/fzf-sessions.sh"

# prefix-tA - Jump straight to the oldest blocked Claude session (no popup)
bind -T tmux-popup A run-shell '~/.config/tmux/scripts/claude-jump.sh'

# prefix-tn - New Tmux Session (prompts for name)
bind -T tmux-popup n command-prompt -p "New session:" "new-session -d -s '%%' && switch-client -t '%%'"

# prefix-? - Cheat sheet of the custom bindings (built from this file's comments)
bind ? display-popup -T '#[align=centre] Keybindings ' -E -w 62% -h 75% \
  "grep -hE '^# prefix' ~/.config/tmux/config/keybindings.conf | sed 's/^# //' | less"

###############################################################################
# Claude keymaps (prefix + a, then second key)
###############################################################################

bind a switch-client -T claude-keys

# prefix-aa - Claude Sessions switcher (popup, attention-first, fzf)
bind -T claude-keys a display-popup -T '#[align=centre] Claude Sessions ' -E -w 70% -h 60% "$POPUP ~/.config/tmux/scripts/fzf-claude.sh"

# prefix-as - Claude Sidebar (toggle a live session list on the left of this window)
bind -T claude-keys s run-shell '~/.config/tmux/scripts/claude-sidebar-toggle.sh #{window_id}'

# prefix-aA - Jump straight to the oldest blocked Claude session (alias of prefix-tA)
bind -T claude-keys A run-shell '~/.config/tmux/scripts/claude-jump.sh'

# prefix-tf - Edit File
bind -T tmux-popup f run-shell 'rm -f /tmp/tmux-fzf-result' \; display-popup -T '#[align=centre] File ' -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-edit-file.sh" \; run-shell '~/.config/tmux/scripts/fzf-open-result.sh'

# prefix-th - Edit File (from $HOME)
bind -T tmux-popup h run-shell 'rm -f /tmp/tmux-fzf-result' \; display-popup -T '#[align=centre] Home File ' -d '~' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-edit-file.sh" \; run-shell '~/.config/tmux/scripts/fzf-open-result.sh'

# prefix-tg - Search (grep)
bind -T tmux-popup g run-shell 'rm -f /tmp/tmux-fzf-result' \; display-popup -T '#[align=centre] Grep ' -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-rg.sh" \; run-shell '~/.config/tmux/scripts/fzf-open-result.sh'

# Git (prefix + g, then second key)
bind g switch-client -T git
# prefix-gg - Lazygit
bind -T git g display-popup -T '#[align=centre] Lazygit ' -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP lazygit -ucd ~/.config/lazygit/"
# prefix-gb - Git branch switcher (recent-first, log preview)
bind -T git b display-popup -T '#[align=centre] Git Branch ' -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-git-branch.sh"
# prefix-gl - Git log browser (Enter: diff, Ctrl-O: checkout)
bind -T git l display-popup -T '#[align=centre] Git Log ' -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-git-log.sh"
# prefix-gs - Git stash browser (Enter: apply, Ctrl-D: drop)
bind -T git s display-popup -T '#[align=centre] Git Stash ' -d '#{pane_current_path}' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-git-stash.sh"

# System & Tools
# prefix-K - Fuzzy find and kill a process
bind K display-popup -T '#[align=centre] Kill Process ' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-kill-process.sh"
# prefix-N - Listening ports (kill the owner)
bind N display-popup -T '#[align=centre] Ports ' -E -w 90% -h 90% "$POPUP ~/.config/tmux/scripts/fzf-ports.sh"