# Nord palette — the single source of truth for these colors.
#
# Pure name=value lines only: this file is parsed BOTH by tmux (source-file
# from theme.conf) and by bash (sourced from tmux/scripts/claude-lib.sh,
# which converts hex to SGR params via claude_sgr). Anything beyond plain
# assignments and comments would break one of the two parsers.
#
# Consumers read this file directly rather than duplicating it:
#   tmux/config/theme.conf     source-file
#   tmux/scripts/claude-lib.sh source (hex -> SGR)
#   sketchybar/scripts/config-nord.sh  source (hex -> 0xAARRGGBB)
#   neovim/lua/config/colors.lua       parse at load time
# kitty can't read this format and keeps its own terminal theme (only its
# `background` overlaps). Change a value here and every consumer follows.

