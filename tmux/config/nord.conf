# Nord palette — the single source of truth for these colors.
#
# Pure name=value lines only: this file is parsed BOTH by tmux (source-file
# from theme.conf) and by bash (sourced from tmux/scripts/claude-lib.sh,
# which converts hex to SGR params via claude_sgr). Anything beyond plain
# assignments and comments would break one of the two parsers.
#
# Other copies of this palette live in ecosystems that can't read this file —
# kitty/themes/nord.conf, sketchybar, neovim — and carry a pointer comment
# back here. Change a value: change it everywhere.

